<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eschatologie - Projet</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
    />
    <link rel="stylesheet" href="./styles/site.css" />
  </head>
  <body>
    <div
      id="map-viewer"
      class="map-viewer"
      data-free-pan="true"
      tabindex="0"
      role="application"
      aria-label="Visionneuse zoomable"
    >
      <img
        id="map-image"
        src="./assets/images/image.png"
        data-image-candidates="./assets/images/image.png,./assets/images/ligne-du-temps-prophetique.png"
        alt="Image principale du projet"
        decoding="async"
        fetchpriority="high"
        draggable="false"
      />
    </div>
    <div id="site-feedback" class="site-feedback" aria-live="polite" aria-atomic="true"></div>

    <audio
      id="project-audio"
      preload="metadata"
      data-audio-candidates="./apocalips-1.mp3,./assets/audio/apocalips-1.mp3,./assets/audio/eschatologie-audio.mp3"
    >
      Votre navigateur ne supporte pas l'audio HTML5.
    </audio>
    <div class="floating-controls">
      <button
        id="audio-toggle"
        class="floating-audio-ui"
        type="button"
        aria-label="Ecouter l'audio"
        aria-pressed="false"
      >
        <span class="material-icons-round audio-icon" aria-hidden="true"
          >play_arrow</span
        >
        <span class="audio-content">
          <span class="audio-label">Écouter l'audio</span>
          <span class="audio-meta">
            <span class="audio-wave" aria-hidden="true">
              <span></span><span></span><span></span><span></span>
            </span>
            <span id="audio-time" class="audio-time">00:00 / 00:00</span>
          </span>
          <span class="audio-progress" aria-hidden="true">
            <span id="audio-progress-fill"></span>
          </span>
        </span>
      </button>
    </div>
    <div class="map-controls" aria-label="Contrôles de zoom">
      <button id="map-zoom-in" type="button" aria-label="Zoom avant">
        <span class="material-icons-round ui-icon" aria-hidden="true"
          >add</span
        >
      </button>
      <button id="map-zoom-out" type="button" aria-label="Zoom arrière">
        <span class="material-icons-round ui-icon" aria-hidden="true"
          >remove</span
        >
      </button>
      <button id="map-reset" type="button" aria-label="Reinitialiser la vue">
        <span class="material-icons-round ui-icon" aria-hidden="true"
          >restart_alt</span
        >
      </button>
    </div>
    <button
      class="side-action-btn project-top-right-btn"
      type="button"
      data-panel="project"
      aria-label="Description du projet"
      title="Ouvrir la description du projet"
    >
      <span class="material-icons-round ui-icon" aria-hidden="true"
        >description</span
      >
      Description
    </button>

    <div id="info-modal" class="info-modal" aria-hidden="true">
      <div class="info-modal-backdrop" data-close-modal="true"></div>
      <section
        class="info-modal-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="info-modal-title"
      >
        <header class="info-modal-header">
          <h2 id="info-modal-title"></h2>
          <button
            id="info-modal-close"
            class="info-modal-close"
            type="button"
            aria-label="Fermer la fenêtre"
          >
            <span class="material-icons-round ui-icon" aria-hidden="true"
              >close</span
            >
          </button>
        </header>
        <div id="info-modal-content" class="info-modal-content"></div>
      </section>
    </div>

    <script src="./js/ui-feedback.js"></script>
    <script src="./js/map-viewer.js"></script>
    <script src="./js/audio-player.js"></script>
    <script src="./js/info-panels.js"></script>
  </body>
</html>
